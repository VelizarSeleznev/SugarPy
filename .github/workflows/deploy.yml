name: Deploy SugarPy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend tests
        run: |
          uv sync --extra test --frozen
          .venv/bin/python -m pytest tests/backend/ -k "not notebook_examples"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Frontend build
        working-directory: web
        run: |
          npm ci
          npm run build

  deploy:
    runs-on: [self-hosted, sugarpy-prod]
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy locally on seggver
        run: |
          chmod +x scripts/deploy-local.sh
          ./scripts/deploy-local.sh
