name: CI and Deploy SugarPy

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend tests
        run: |
          uv sync --extra test --frozen
          .venv/bin/python -m pytest tests/backend/ -k "not notebook_examples"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies and Playwright browser
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Full project checks
        env:
          CI: "1"
        run: |
          ./scripts/check all

  deploy:
    runs-on: [self-hosted, sugarpy-prod]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy locally on seggver
        run: |
          chmod +x scripts/deploy-local.sh
          ./scripts/deploy-local.sh
